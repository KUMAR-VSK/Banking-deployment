spring.application.name=Bank-Loan-Management

# Database Configuration - Using MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/banking_master?createDatabaseIfNotExist=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:vsk@1234}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# Kafka Configuration - Disabled for Railway deployment
# spring.kafka.bootstrap-servers=localhost:9092
# spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
# spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# spring.kafka.consumer.group-id=loan-management-group

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsAtLeast32CharactersLong}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=8080

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
